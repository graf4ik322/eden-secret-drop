server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # === Security Headers ===
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # === Block common scanner paths (404 without logging) ===
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 404;
    }
    location ~* /(\.git|\.env|\.svn|\.hg|vendor|node_modules|composer\.json|package-lock\.json|wp-admin|wp-content|administrator|admin\.php|rclone\.conf|service-worker\.js|serviceAccountKey\.json|firebase-adminsdk\.json|id_ecdsa|id_rsa|trace\.axd|openapi\.json|swagger|graphql|_debug) {
        return 404;
    }
    location ~* /(v1|v2|api)/(graphql|settings|account|users|login|register) {
        return 404;
    }

    # Upload endpoint (FR-10/11)
    location /api/upload {
        client_max_body_size 12m;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_comp_level 6;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Static assets — cache 1 year
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Uploaded files (FR-10/11)
    location /uploads/ {
        alias /app/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # tRPC API
    location /trpc/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Telegram webhook
    location ~ ^/[0-9]+:[a-zA-Z0-9_-]+ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Image proxy (preconnect)
    location /img/ {
        proxy_pass https://img.edencore.cc/;
        proxy_http_version 1.1;
        proxy_set_header Host img.edencore.cc;
    }
}
