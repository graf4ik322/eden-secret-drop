version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eden_secret_drop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../infra/Dockerfile.backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/eden_secret_drop
      REDIS_URL: redis://redis:6379
      PORT: "3001"
      HOST: "0.0.0.0"
      NODE_ENV: production
    ports:
      - "3001:3001"

  bot:
    build:
      context: ./bot
      dockerfile: ../infra/Dockerfile.bot
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BOT_TOKEN: "${BOT_TOKEN}"
      WEBHOOK_URL: "${WEBHOOK_URL}"
      BOT_PORT: "3002"
      HOST: "0.0.0.0"
      MINI_APP_URL: "${MINI_APP_URL}"
      ADMIN_IDS: "${ADMIN_IDS}"
    ports:
      - "3002:3002"

volumes:
  pgdata:
