services:
  eden:
    image: 'ghcr.io/graf4ik322/eden-secret-drop:latest'
    pull_policy: always
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '8480:80'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - 'DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable'
      - 'REDIS_URL=redis://redis:6379'
      - 'BOT_TOKEN=${BOT_TOKEN}'
      - 'ADMIN_IDS=${ADMIN_IDS}'
      - 'DOMAIN=${DOMAIN}'
      - NODE_ENV=production
      - HOST=0.0.0.0

  postgres:
    image: 'postgres:17'
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - 'POSTGRES_USER=${POSTGRES_USER}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}'
      - 'POSTGRES_DB=${POSTGRES_DB}'
      - TZ=UTC
    ports:
      - '127.0.0.1:5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 3s
      timeout: 10s
      retries: 3

  redis:
    image: 'redis:7-alpine'
    restart: unless-stopped
    ports:
      - '127.0.0.1:6479:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  redisdata:
