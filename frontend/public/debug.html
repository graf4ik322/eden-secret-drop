<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>EDEN Debug</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#071A17;color:#F5EDDD;font-family:monospace;padding:16px;font-size:13px;line-height:1.5}
h1{color:#D2B980;font-size:18px;margin-bottom:16px}
h2{color:#D2B980;font-size:14px;margin:16px 0 8px;border-bottom:1px solid rgba(210,185,128,.3);padding-bottom:4px}
.block{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:10px;margin-bottom:8px;overflow-x:auto;word-break:break-all}
.ok{color:#4CD07F}
.err{color:#FF6B6B}
.muted{color:#8A908E}
.gold{color:#D2B980}
pre{white-space:pre-wrap;word-break:break-all}
.btn{background:linear-gradient(135deg,#D2B980,#E7D5A7);color:#071A17;padding:8px 16px;border-radius:8px;border:none;font-weight:600;cursor:pointer;margin:8px 0;font-size:14px}
</style>
</head>
<body>
<h1>🔍 EDEN Debug</h1>
<p class="muted" id="ts"></p>
<button class="btn" id="runBtn">🔄 Run Diagnostics</button>

<h2>1. window.Telegram</h2>
<div class="block" id="d1"><span class="muted">waiting...</span></div>

<h2>2. window.Telegram.WebApp</h2>
<div class="block" id="d2"><span class="muted">waiting...</span></div>

<h2>3. URL hash</h2>
<div class="block" id="d3"><span class="muted">waiting...</span></div>

<h2>4. initData (raw string)</h2>
<div class="block" id="d4"><span class="muted">waiting...</span></div>

<h2>5. initDataUnsafe</h2>
<div class="block" id="d5"><span class="muted">waiting...</span></div>

<h2>6. initDataUnsafe.user</h2>
<div class="block" id="d6"><span class="muted">waiting...</span></div>

<script>
'use strict';
const $ = id => document.getElementById(id);

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function json(v) {
  if (v === undefined) return '<span class="err">undefined</span>';
  if (v === null) return '<span class="muted">null</span>';
  let j;
  try { j = JSON.stringify(v, null, 2); } catch(e) { j = String(v); }
  return '<pre>' + esc(j) + '</pre>';
}

function run() {
  const ts = document.getElementById('ts');
  if (ts) ts.textContent = '🕐 ' + new Date().toISOString();

  // ——— 1. window.Telegram ———
  const tg = window.Telegram;
  const d1 = $('d1');
  if (tg) {
    d1.innerHTML = '<span class="ok">✅ EXISTS</span><br>type: ' + typeof tg + '<br>keys: ' + esc(Object.keys(tg).join(', '));
  } else {
    d1.innerHTML = '<span class="err">❌ NOT FOUND</span><br>window.Telegram is <span class="err">undefined</span>';
  }

  // ——— 2. window.Telegram.WebApp ———
  const wa = tg?.WebApp;
  const d2 = $('d2');
  if (wa) {
    const keys = Object.keys(wa).filter(k => !k.startsWith('_'));
    d2.innerHTML = '<span class="ok">✅ EXISTS</span><br>keys: ' + esc(keys.join(', '));
  } else {
    d2.innerHTML = '<span class="err">❌ NOT FOUND</span><br>window.Telegram.WebApp is ' + (tg ? 'defined but null/empty' : 'unreachable (tg missing)');
  }

  // ——— 3. URL hash ———
  const hash = window.location.hash;
  const d3 = $('d3');
  if (hash && hash.length > 10) {
    d3.innerHTML = '<span class="ok">✅ HAS HASH</span> (' + hash.length + ' chars)<br><pre>' + esc(hash.substring(0, 600)) + '</pre>';
    // Parse hash params
    try {
      const hp = new URLSearchParams(hash.substring(1));
      let html = '<br><span class="gold">Hash params:</span><br>';
      for (const [k, v] of hp.entries()) {
        html += '<span class="gold">' + esc(k) + '</span>: ' + esc(v.substring(0, 300)) + '<br>';
      }
      d3.innerHTML += html;
    } catch(e) {
      d3.innerHTML += '<br><span class="err">Parse error: ' + esc(e.message) + '</span>';
    }
  } else {
    d3.innerHTML = '<span class="err">❌ EMPTY</span> (length=' + (hash ? hash.length : 0) + ')';
  }

  // ——— 4. initData raw ———
  const initData = wa?.initData || '';
  const d4 = $('d4');
  if (initData) {
    d4.innerHTML = '<span class="ok">✅ HAS initData</span> (' + initData.length + ' chars)<br><pre>' + esc(initData.substring(0, 1000)) + '</pre>';
    // Parse user from initData
    try {
      const qp = new URLSearchParams(initData);
      const userStr = qp.get('user');
      if (userStr) {
        d4.innerHTML += '<br><span class="gold">user param:</span> ' + esc(userStr.substring(0, 500));
      }
      d4.innerHTML += '<br><span class="muted">hash param: ' + esc((qp.get('hash') || 'N/A').substring(0, 30)) + '...</span>';
    } catch(e) {
      d4.innerHTML += '<br><span class="err">parse error: ' + esc(e.message) + '</span>';
    }
  } else {
    d4.innerHTML = '<span class="err">❌ EMPTY</span>';
    // Fallback: try to get from URL hash
    try {
      const hp = new URLSearchParams(hash.substring(1));
      const tgData = hp.get('tgWebAppData');
      if (tgData) {
        d4.innerHTML += '<br><span class="ok">✅ Found in URL hash as tgWebAppData</span><br><pre>' + esc(decodeURIComponent(tgData).substring(0, 600)) + '</pre>';
      }
    } catch(e) {
      d4.innerHTML += '<br><span class="err">hash parse error: ' + esc(e.message) + '</span>';
    }
  }

  // ——— 5. initDataUnsafe ———
  const idu = wa?.initDataUnsafe;
  const d5 = $('d5');
  if (idu) {
    d5.innerHTML = '<span class="ok">✅ EXISTS</span><br>' + json(idu);
  } else {
    d5.innerHTML = '<span class="err">❌ EMPTY</span>';
  }

  // ——— 6. initDataUnsafe.user ———
  const user = idu?.user;
  const d6 = $('d6');
  if (user) {
    d6.innerHTML = '<span class="ok">✅ HAS USER</span><br>' + json(user);
  } else {
    d6.innerHTML = '<span class="err">❌ NO USER</span><br>initDataUnsafe.user is ' + (idu ? 'empty/undefined' : 'initDataUnsafe missing');
  }

  // Log all errors to console for debugging
  console.log('=== EDEN DEBUG ===');
  console.log('Telegram:', tg);
  console.log('WebApp:', wa);
  console.log('initData:', initData);
  console.log('initDataUnsafe:', idu);
  console.log('user:', user);
  console.log('hash:', hash);
}

// Auto-run on load
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(run, 200);
});

// Button handler
document.getElementById('runBtn').addEventListener('click', function(e) {
  e.preventDefault();
  run();
});
</script>
</body>
</html>
